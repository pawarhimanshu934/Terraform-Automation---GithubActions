name: "Terraform Multi-Environment Workflow"
on:
    push:
        branches:
            - main
            - dev
    pull_request:
        branches:
            - main
            - dev

jobs:
    terraform-plan:
        name: "Terraform Plan"
        runs-on: ubuntu-latest
        environment: ${{ github.event_name == 'pull_request' && 'prod' || 'dev' }}
        outputs:
            tf_workspace: ${{ steps.env-vars.outputs.tf_workspace }}
        defaults:
            run:
                shell: bash
        
        steps:
            - name: "Checkout Repository"
              uses: actions/checkout@v4

            - name: "Set up Terraform"
              uses: hashicorp/setup-terraform@v4
              with:
                terraform_version: "1.14.6"

            - name: "Setup TF-Lint"
              uses: terraform-linters/setup-tflint@v6
              with :
                tflint_version: v0.52.0
                cache: true

            - name: "TF-Lint Init"
              env:
                GITHUB_TOKEN: ${{ github.token }}
              run: tflint --init
              
            - name: "TF-Lint Run"
              env:
                GITHUB_TOKEN: ${{ github.token }}
              run: tflint -f compact
            
            - name: Run Trivy vulnerability scanner in IaC mode
              uses: aquasecurity/trivy-action@0.33.1
              with:
                scan-type: 'config'
                hide-progress: false
                format: 'sarif'
                output: 'trivy-results.sarif'
                ignore-unfixed: true
                exit-code: '0'
                severity: 'CRITICAL,HIGH'

            - name: Upload Trivy scan results to GitHub Security tab
              if: always()
              uses: github/codeql-action/upload-sarif@v4
              with:
                sarif_file: 'trivy-results.sarif'

            - name: Terraform Init
              id: init
              run: terraform init -input=false

            - name: Terraform fmt
              id: fmt
              run: terraform fmt -check
              
            - name: Terraform Validate
              id: validate
              run: terraform validate -no-color

            - name: Set Environement Variable
              id : env-vars
              run : |
                if [[ "${{ github.event_name }}" == "pull_request" ]]; then
                  BRANCH_NAME="${{github.base_ref}}"
                else
                  BRANCH_NAME="${{github.ref_name}}"
                fi

                if [[ $BRANCH_NAME == "main" ]]; then
                  echo "WORKSPACE_NAME=prod" >> $GITHUB_ENV
                  echo "tf_workspace=prod" >> $GITHUB_OUTPUT
                  echo "TF_VAR_FILE=prod.tfvars" >> $GITHUB_ENV
                else
                 echo "WORKSPACE_NAME=dev" >> $GITHUB_ENV
                  echo "tf_workspace=dev" >> $GITHUB_OUTPUT
                  echo "TF_VAR_FILE=dev.tfvars" >> $GITHUB_ENV
                fi

            - name: Create tfvars file
              run : |
                echo "{ secrets.TFVARS }}" > $TF_VAR_FILE

            - name: Workspace Select
              run : |
                terraform workspace select $tf_workspace || terraform workspace new $tf_workspace

            - name: Terraform Plan
              id : plan
              run : terraform plan -var-file=$TF_VAR_FILE -out=tfplan -input=false
              continue-on-error: true

            - name: Post comment on the PR containing results of Terraform Plan
              uses: actions/github-script@v6
              if: github.event_name == 'pull_request'
              env:
                PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
              with:
                github-token: ${{ secrets.GITHUB_TOKEN }}
                script: |
                  const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
                  #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
                  ### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
                  <details><summary>Validation Output</summary>

                  \`\`\`\n
                  ${{ steps.validate.outputs.stdout }}
                  \`\`\`

                   </details>

                  #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

                  <details><summary>Show Plan</summary>

                   \`\`\`\n
                   ${process.env.PLAN}
                   \`\`\`

                  </details>

                  *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Working Directory: \`${{ env.tf_actions_working_dir }}\`, Workflow: \`${{ github.workflow }}\`*`;

                   github.rest.issues.createComment({
                    issue_number: context.issue.number,
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    body: output
                    })

            - name: Terraform Plan Status
              if: steps.plan.outcome == 'failure'
              run : exit 1

            - name: Upload Plan Artifact
              uses: actions/upload-artifact@v4
              with:
                name: terraform-plan-${{ env.WORKSPACE_NAME }}
                path: tfplan

    terraform-apply:
       name: "Terraform Apply"
       needs: terraform-plan
       if: github_event_name == 'push'
       runs-on: ubuntu-latest
       environment: ${{ needs.terraform-plan.outputs.tf_workspace }}
       defaults:
            run:
                shell: bash
       
       steps: 
          - name: "Checkout Repository"
            uses: actions/checkout@v4

          - name: "Set up Terraform"
            uses: hashicorp/setup-terraform@v4
            with:
                terraform_version: "1.14.6"
          
          - name: "Terraform Init"
            run: terraform init -input=false

          - name: "Set Environment Variable"
            id: env-vars
            run: |
              $BRANCH_NAME="${{github.ref_name}}"
              if [[ $BRANCH_NAME == "main" ]]; then
                echo "WORKSPACE_NAME=prod" >> $GITHUB_ENV
                echo "TF_VAR_FILE=prod.tfvars" >> $GITHUB_ENV
              else
                echo "WORKSPACE_NAME=dev" >> $GITHUB_ENV
                echo "TF_VAR_FILE=dev.tfvars" >> $GITHUB_ENV
              fi

          - name: Create tfvars file
            run: | 
              echo "{ secrets.TFVARS }}" > $TF_VAR_FILE

          - name: Select Terraform Workspace
            run: |
              terraform workspace select $WORKSPACE_NAME || terraform workspace new $WORKSPACE_NAME

          - name: Download Plan Artifact
            uses: actions/download-artifact@v4
            with:
              name: terraform-plan-${{ env.WORKSPACE_NAME }}
              path: .

          - name: Terraform Apply
            run: terraform apply -var-file=$TF_VAR_FILE -input=false tfplan