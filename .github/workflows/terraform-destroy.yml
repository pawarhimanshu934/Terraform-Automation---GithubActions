name: "Terraform Destroy Workflow"

on:
    workflow_dispatch:
        inputs:
            environment:
                description: "Select the environment to destroy"
                required: true
                default: "dev"
                type: choice
                options:
                    - dev
                    - prod
            confirm_destroy:
                description: "Type 'destroy' to confirm"
                required: true
                type: string
    

env:
    AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
    AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
    terraform-destroy:
        name: "Terraform Destroy"
        runs-on: ubuntu-latest
        environment: ${{ github.event.inputs.environment }}
        defaults:
            run:
                shell: bash
        
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Verify Destroy
              run: |
                if [ "${{ github.event.inputs.confirm_destroy }}" != "destroy" ]; then
                    echo "Destroy confirmation not provided. Please type 'destroy' to confirm."
                    exit 1
                fi

            - name: Set up Terraform
              uses: hashicorp/setup-terraform@v4
              with:
                terraform_version: "1.14.6"

            - name: Terraform Init
              run: terraform init

            - name: Set Environment Variables
              id: env-vars
              run: |
                ENV_NAME = "${{ github.event.inputs.environment }}"
                if [ "$ENV_NAME" == "prod" ]; then
                    echo "WORKSPACE_NAME=prod" >> $GITHUB_ENV
                    echo "TF_VAR_FILE=prod.tfvars" >> $GITHUB_ENV
                else
                    echo "WORKSPACE_NAME=dev" >> $GITHUB_ENV
                    echo "TF_VAR_FILE=dev.tfvars" >> $GITHUB_ENV
                fi

            - name: Select Terraform Workspace
              run: |
                terraform workspace select $WORKSPACE_NAME || terraform workspace new $WORKSPACE_NAME
            
            - name: Terraform Destroy
              run: terraform destroy -var-file=$TF_VAR_FILE -auto-approve